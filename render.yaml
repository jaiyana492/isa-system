services:
  - type: web
    name: corepilora-isa
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    pythonVersion: "3.11.9"
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: HUBSPOT_ACCESS_TOKEN
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: HUBSPOT_PORTAL_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: APP_DOMAIN
        sync: false
      - key: ISA_NAME
        value: Jaiyana
      - key: PRIMARY_MARKET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
